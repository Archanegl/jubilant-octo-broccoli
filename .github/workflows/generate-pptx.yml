name: Generate PPTX from Markdown
on:
  workflow_dispatch:
  push:
    paths:
      - 'docs/slides.md'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install deps
        run: pip install python-pptx
      - name: Run generator
        run: |
          mkdir -p scripts
          cat > scripts/generate_pptx.py <<'PY'
          # (把上面 generate_pptx.py 的完整内容粘贴到这里)
          PY
          python scripts/generate_pptx.py docs/slides.md docs/presentation.pptx
      - name: Commit and push PPTX
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/presentation.pptx || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: generate presentation.pptx from slides.md"
            git push
          fi
