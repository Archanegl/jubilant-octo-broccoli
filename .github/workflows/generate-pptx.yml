  - name: Setup Python
    uses: actions/setup-python@v4
    with:
      python-version: '3.11'

  - name: Install dependencies
    run: |
      python -m pip install --upgrade pip
      pip install python-pptx

  - name: Generate PPTX
    run: |
      python generate_pptx.py

  - name: Verify output and copy to root
    run: |
      ls -la output || true
      if [ -f output/presentation_real.pptx ]; then
        cp output/presentation_real.pptx presentation.pptx
      else
        echo "Error: output/presentation_real.pptx not found" && exit 1
      fi

  - name: Commit generated files
    uses: EndBug/add-and-commit@v9
    with:
      author_name: github-actions[bot]
      author_email: 41898282+github-actions[bot]@users.noreply.github.com
      message: "Generate and add presentation PPTX (generated by workflow)"
      add: "output/presentation_real.pptx presentation.pptx"
      push: true
